<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GREENS RAIN ALERT</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f0f8ff; color: #333; margin:0; padding:0;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="20" cellspacing="0" style="background-color: #ffffff; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
          <tr>
            <td align="center" style="font-size: 24px; font-weight: bold; padding-bottom: 10px;">
              🌱
            </td>
          </tr>
          <tr>
            <td align="center" style="font-size: 20px; padding: 20px; color: {{central_message_color}};">
              {{central_message}}
            </td>
          </tr>
          <tr>
            <td>
              <table width="100%" cellpadding="10" cellspacing="0" style="border:1px solid #ddd; border-radius: 8px;">
                <tr style="background-color: {{rain_sum_today_color}};">
                  <td style="font-weight: bold; width: 30%">📅 Heute</td>
                  <td style="text-align: right; width: 70%">
                    <span style="font-weight:bold;">{{rain_sum_today}} mm</span> {{rain_sum_today_emoji}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td>
              <table width="100%" cellpadding="10" cellspacing="0" style="border:1px solid #ddd; border-radius: 8px;">
                <tr style="background-color: {{rain_sum_tomorrow_color}};">
                  <td style="font-weight: bold; width: 30%">📅 Morgen</td>
                  <td style="text-align: right; width: 70%">
                    <span style="font-weight:bold;">{{rain_sum_tomorrow}} mm</span> {{rain_sum_tomorrow_emoji}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
