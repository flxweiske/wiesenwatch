name: wiesenwatch

on:
  schedule:
    - cron: '31 4 * * *'
  workflow_dispatch:

jobs:
  build-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container
        run: |
          docker build -t wiesenwatch .
      
      - name: Run container
        run: |
          docker run \
            -e MAIL=${{ secrets.MAIL }} \
            -e KEY=${{ secrets.KEY }} \
            -e LATITUDE=${{ secrets.LATITUDE }} \
            -e LONGITUDE=${{ secrets.LONGITUDE }} \
            -e RAIN_SUM_THRESHOLD=${{ vars.RAIN_SUM_THRESHOLD }} \
            wiesenwatch
